# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Chạy script khi có thay đổi đẩy lên nhánh main
  push:
    branches: ['main']

  # Cho phép kích hoạt thủ công từ giao diện tab Actions
  workflow_dispatch:

# Phân quyền cho Github token để cho phép deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Xử lý tính trạng nhiều lệnh trùng lặp
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Bước build và deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn (Checkout)
        uses: actions/checkout@v4
      
      - name: Khởi tạo NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Cài đặt thư viện (Dependencies)
        run: npm ci
        
      - name: Tạo bản mộc (Build)
        run: npm run build
        
      - name: Phân quyền giao diện GitHub
        uses: actions/configure-pages@v4
        with:
          enablement: true
        
      - name: Nén và Up Artifact (thư mục dist của Vite)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Triển khai tới máy chủ GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
